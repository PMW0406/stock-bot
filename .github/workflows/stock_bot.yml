name: Stock Bot

on:
  schedule:
    - cron: '10 22 * * 0-4'  # 한국시간 오전 7시10분 (UTC 22시10분), 월~금 (UTC일~목)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install pandas numpy yfinance finance-datareader anthropic requests

      - name: 메일 봇 실행 (분석 리포트)
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python morning_bot_cloud.py

      - name: candidates.json 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add candidates.json history.json
          git diff --cached --quiet || git commit -m "Daily update: candidates + history $(date +'%Y-%m-%d')"
          git push
